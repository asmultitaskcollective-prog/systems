<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ops Repair Studio | Systems Audit and Workflow Cleanup</title>
  <meta name="description" content="CRM cleanup, workflow automation, and documentation systems for teams that need calmer operations and clearer execution.">
  <meta name="robots" content="index, follow">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --surface-2: #eef2ee;
      --ink: #17201d;
      --muted: #64736d;
      --quiet: #94a19c;
      --line: rgba(23, 32, 29, .12);
      --line-strong: rgba(23, 32, 29, .2);
      --accent: #0b766f;
      --accent-2: #d88b1f;
      --dark: #101817;
      --dark-ink: #eff5f2;
      --max: 1120px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(11, 118, 111, .07), transparent 420px),
        linear-gradient(90deg, rgba(216, 139, 31, .055), transparent 36%),
        var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    .shell { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 248, 245, .9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--dark);
      color: var(--dark-ink);
      font-family: var(--mono);
      font-size: 13px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .nav-links a:hover { border-color: var(--line); color: var(--ink); background: rgba(255, 255, 255, .6); }
    .nav-links .nav-cta { background: var(--dark); color: var(--dark-ink); border-color: var(--dark); }
