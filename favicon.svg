<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black background -->
  <rect width="32" height="32" fill="#111111"/>
  
  <!-- Staggered ASMC in blue serif -->
  <!-- A — top left -->
  <text x="2" y="14" font-family="Georgia, 'Times New Roman', serif" font-size="13"
        font-weight="700" fill="#2255CC" letter-spacing="-0.5">A</text>
  <!-- S — middle left, larger -->
  <text x="1" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="16"
        font-weight="700" fill="#2255CC">S</text>
  <!-- M — center right -->
  <text x="13" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="13"
        font-weight="700" fill="#2255CC">M</text>
  <!-- C — bottom right -->
  <text x="17" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="13"
        font-weight="700" fill="#2255CC">C</text>
</svg>
